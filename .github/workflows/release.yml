name: Release APK

# Builds the app APK and publishes it to a GitHub Release whenever a v* tag is pushed.
# If the release keystore secrets are configured it produces a signed RELEASE APK;
# otherwise it falls back to the debug APK (also installable) so the flow never breaks.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 36
        run: sdkmanager "platforms;android-36"

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ steps.keystore.outputs.present }}" = "true" ]; then
            echo "Keystore present — building signed release APK"
            ./gradlew :app:assembleRelease --no-daemon --stacktrace
            SRC=app/build/outputs/apk/release/app-release.apk
          else
            echo "No keystore secret — building debug APK"
            ./gradlew :app:assembleDebug --no-daemon --stacktrace
            SRC=app/build/outputs/apk/debug/app-debug.apk
          fi
          OUT="AirBridge-${VERSION}.apk"
          cp "$SRC" "$OUT"
          echo "APK=$OUT" >> "$GITHUB_ENV"

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: AirBridge ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.APK }}
