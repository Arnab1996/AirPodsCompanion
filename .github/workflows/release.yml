name: Release APK

# Builds the debug APK (signed with the debug key, so it's directly installable) and
# publishes it to a GitHub Release whenever a v* tag is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 36
        run: sdkmanager "platforms;android-36"

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: AirBridge ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/debug/app-debug.apk
